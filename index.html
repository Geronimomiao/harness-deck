<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人类早期驯服野马指南 — Harness Engineering</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #1a1917;
    font-family: "Songti SC", "STSong", Georgia, serif;
  }

  #deck {
    height: 100%;
    transition: transform 0.55s cubic-bezier(0.33, 1, 0.68, 1);
    will-change: transform;
  }

  .slide {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide img {
    max-width: 100vw;
    max-height: 100vh;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* 页码指示 */
  #counter {
    position: fixed;
    right: 22px;
    bottom: 18px;
    color: rgba(255, 255, 255, 0.55);
    font-size: 13px;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* 右侧进度条 */
  #progress {
    position: fixed;
    right: 0;
    top: 0;
    width: 3px;
    height: 100%;
    z-index: 10;
    pointer-events: none;
  }
  #progress-bar {
    width: 100%;
    background: rgba(255, 255, 255, 0.45);
    height: 0;
    transition: height 0.55s cubic-bezier(0.33, 1, 0.68, 1);
  }

  /* 首屏操作提示 */
  #hint {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.75);
    background: rgba(20, 20, 20, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(6px);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 1px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="deck"></div>

<div id="counter">1 / 56</div>
<div id="progress"><div id="progress-bar"></div></div>
<div id="hint">↑ ↓ 方向键 / 滚轮 / 空格 翻页</div>

<script>
(function () {
  const TOTAL = 56;
  const deck = document.getElementById('deck');
  const counter = document.getElementById('counter');
  const progressBar = document.getElementById('progress-bar');
  const hint = document.getElementById('hint');

  for (let i = 1; i <= TOTAL; i++) {
    const s = document.createElement('section');
    s.className = 'slide';
    s.dataset.page = i;
    const img = document.createElement('img');
    img.src = 'assets/slides/slide-' + i + '.webp';
    img.alt = 'Slide ' + i;
    img.decoding = 'async';
    s.appendChild(img);
    deck.appendChild(s);
  }

  let current = 0;
  let hintDismissed = false;

  function clamp(n) { return Math.max(0, Math.min(TOTAL - 1, n)); }

  function go(n, instant) {
    n = clamp(n);
    if (n === current && !instant) return;
    current = n;
    deck.style.transition = instant ? 'none' : '';
    deck.style.transform = 'translateY(' + (-current * 100) + 'vh)';
    counter.textContent = (current + 1) + ' / ' + TOTAL;
    progressBar.style.height = ((current + 1) / TOTAL * 100) + '%';
    history.replaceState(null, '', '#' + (current + 1));
    if (!hintDismissed && current > 0) {
      hintDismissed = true;
      hint.classList.add('hidden');
    }
  }

  // 键盘
  window.addEventListener('keydown', function (e) {
    switch (e.key) {
      case 'ArrowDown': case 'PageDown': case ' ': case 'Enter':
        e.preventDefault(); go(current + 1); break;
      case 'ArrowUp': case 'PageUp':
        e.preventDefault(); go(current - 1); break;
      case 'Home':
        e.preventDefault(); go(0); break;
      case 'End':
        e.preventDefault(); go(TOTAL - 1); break;
    }
  });

  // 滚轮（节流：一次滚动只翻一页）
  let wheelLock = false;
  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    if (wheelLock || Math.abs(e.deltaY) < 12) return;
    wheelLock = true;
    go(current + (e.deltaY > 0 ? 1 : -1));
    setTimeout(function () { wheelLock = false; }, 620);
  }, { passive: false });

  // 触摸滑动
  let touchY = null;
  window.addEventListener('touchstart', function (e) {
    touchY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', function (e) {
    if (touchY === null) return;
    const dy = touchY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 40) go(current + (dy > 0 ? 1 : -1));
    touchY = null;
  }, { passive: true });

  // 支持 #页码 直达
  const start = parseInt(location.hash.slice(1), 10);
  go(isNaN(start) ? 0 : start - 1, true);

  setTimeout(function () {
    if (!hintDismissed) { hintDismissed = true; hint.classList.add('hidden'); }
  }, 5000);
})();
</script>

</body>
</html>
