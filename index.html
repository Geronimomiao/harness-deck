<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊聊 Harness — Harness Engineering</title>
<style>
  /* 拉丁字符使用内置的 Libre Baskerville；中文使用本机已授权的锐宋粗。 */
  @font-face {
    font-family: "Deck Serif";
    src:
      url("assets/fonts/Reeji-CloudRuiSongCu-GBK.ttf") format("truetype"),
      local("锐字云字库锐宋粗GBK"),
      local("锐字云字库锐宋粗"),
      local("REEJI-RuiSongCuGBK"),
      local("REEJI-RuiSongCu");
    font-style: normal;
    font-weight: 700;
    unicode-range: U+2E80-2EFF, U+3000-303F, U+31C0-31EF, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF, U+FE30-FE4F, U+20000-2FA1F;
  }
  @font-face {
    font-family: "Deck Serif";
    src: url("assets/fonts/LibreBaskerville-wght.ttf") format("truetype");
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    unicode-range: U+0000-024F, U+1E00-1EFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: clip;
    background: #1a1917;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
    font-weight: 700;
  }

  body {
    position: fixed;
    inset: 0;
    width: 100%;
  }

  #deck {
    height: 100%;
    transition: transform 0.55s cubic-bezier(0.33, 1, 0.68, 1);
    will-change: transform;
  }

  .slide {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 氛围底：当前页的模糊放大版，填满黑边区域 */
  .slide img.ambient {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(28px) brightness(0.72) saturate(1.15);
    transform: scale(1.12);
  }
  .slide img.main {
    position: relative;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  body.fit-contain .slide img.main { object-fit: contain; }
  body .slide.edge-fill img.main { object-fit: cover; }

  /* 第 2、3 页是上下连续构图：上一页锁定底边，下一页锁定顶边。 */
  body .slide.stitch-slide img.main {
    position: absolute;
    left: 0;
    width: 100%;
    height: auto;
    object-fit: fill;
  }
  .slide.stitch-upper { background: #b3aeaf; }
  .slide.stitch-upper img.main { bottom: 0; }
  .slide.stitch-lower { background: #dadada; }
  .slide.stitch-lower img.main {
    top: calc(100vw * 584 / 4640 - 100vw * 320 / 2560);
    clip-path: inset(calc(100vw * 320 / 2560) 0 0 0);
  }
  .slide.stitch-lower img.stitch-continuation {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: auto;
    display: block;
    z-index: 2;
    pointer-events: none;
  }
  .stitch-upper-copy {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    aspect-ratio: 2560 / 1733;
    z-index: 2;
    pointer-events: none;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .stitch-upper-copy .corner {
    position: absolute;
    top: 19%;
    font-family: "Libre Baskerville", Georgia, serif;
    font-size: clamp(26px, 3.4vw, 88px);
    font-style: italic;
    font-weight: 700;
    color: rgba(38, 37, 35, .68);
  }
  .stitch-upper-copy .corner.l { left: 3.8%; }
  .stitch-upper-copy .corner.r { right: 3.8%; }
  .stitch-upper-copy .headline {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    text-align: center;
    color: #282725;
    font-size: clamp(54px, 7vw, 180px);
    font-weight: 700;
    line-height: .98;
    letter-spacing: .01em;
  }
  .stitch-upper-copy .headline span { display: block; }
  .stitch-upper-copy .headline span + span { margin-top: .12em; }

  /* 第 8 页：纯标题首帧，按键后播放注意力机制片段。 */
  .context-video-slide { background: #000; }
  .context-video-slide > img.main,
  .context-video-slide > img.ambient { display: none; }
  .attention-title {
    position: absolute;
    left: 5.7%;
    top: 49%;
    z-index: 2;
    color: #f7f6f1;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
    font-size: clamp(58px, 7.15vw, 132px);
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -.04em;
    white-space: nowrap;
    transform: translateY(-50%);
  }
  .attention-video-shell {
    position: absolute;
    inset: 0;
    z-index: 6;
    overflow: hidden;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .28s ease;
  }
  .context-video-slide.video-playing .attention-video-shell { opacity: 1; }
  .attention-video-shell video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  /* ========== 第 42 页：从左到右抽取英雄卡 ========== */
  .hero-card-slide {
    background: #000;
    overflow: clip;
    color: #fff;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .hero-card-title {
    position: absolute;
    top: 6.5%;
    left: 5.4%;
    z-index: 5;
    font-size: clamp(52px, 6.4vw, 150px);
    line-height: .9;
    font-weight: 700;
    letter-spacing: -.045em;
  }
  .hero-card-stage {
    position: absolute;
    inset: 13% 2.2% 5%;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0;
    align-items: end;
    perspective: 1800px;
  }
  .hero-card {
    --tilt: 0deg;
    --start-x: 0%;
    --rest-x: 0%;
    --lift: 0%;
    --rest-scale: 1;
    position: relative;
    height: 96%;
    width: auto;
    aspect-ratio: .66;
    justify-self: center;
    overflow: hidden;
    border-radius: clamp(24px, 2.5vw, 58px);
    box-shadow: 0 2.2vw 4vw rgba(0, 0, 0, .68);
    opacity: 0;
    transform-origin: 50% 100%;
    transform: translate(var(--start-x), 34%) scale(.18) rotateY(88deg) rotateZ(var(--tilt));
    transition:
      transform .9s cubic-bezier(.18, .9, .2, 1.12),
      opacity .18s ease-out;
    will-change: transform, opacity;
  }
  .hero-card::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 3;
    border: 1px solid rgba(255, 255, 255, .68);
    border-radius: inherit;
    pointer-events: none;
  }
  .hero-card::after {
    content: "";
    position: absolute;
    inset: -35%;
    z-index: 4;
    background: linear-gradient(110deg, transparent 38%, rgba(255,255,255,.68) 49%, transparent 60%);
    transform: translateX(-85%) rotate(8deg);
    opacity: 0;
    pointer-events: none;
  }
  .hero-card.is-visible {
    opacity: 1;
    transform: translate(var(--rest-x), var(--lift)) scale(var(--rest-scale)) rotateY(0) rotateZ(var(--tilt));
  }
  .hero-card.is-visible::after { animation: card-shine .78s .34s ease-out; }
  @keyframes card-shine {
    0% { opacity: 0; transform: translateX(-85%) rotate(8deg); }
    28% { opacity: .75; }
    100% { opacity: 0; transform: translateX(85%) rotate(8deg); }
  }
  .hero-card.sr {
    --tilt: 2.4deg;
    --start-x: 112%;
    --rest-x: -4%;
    --lift: 1%;
    --rest-scale: .9;
    background: linear-gradient(145deg, #f2efff 0%, #eef4ff 48%, #cbd0ff 100%);
    justify-self: start;
    z-index: 1;
  }
  .hero-card.a {
    --tilt: -7deg;
    --rest-x: 0%;
    background: linear-gradient(150deg, #fffdf2 0%, #efffdc 55%, #a9ff62 100%);
    z-index: 2;
  }
  .hero-card.ssr {
    --tilt: 3deg;
    --start-x: -112%;
    --rest-x: -8%;
    --rest-scale: .96;
    background: linear-gradient(145deg, #eefeff 0%, #e5fbf5 48%, #b7f2ef 100%);
    justify-self: end;
    z-index: 1;
    overflow: visible;
  }
  .hero-card img {
    position: absolute;
    z-index: 1;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .hero-card.sr img { left: -22%; bottom: -22%; width: 152%; }
  .hero-card.a img { left: -38%; bottom: -20%; width: 175%; }
  .hero-card.ssr img {
    right: -12%;
    bottom: -2%;
    width: 132%;
    clip-path: inset(-100% 9.1% 1.57% -100% round 0 0 6% 0);
  }
  .hero-rarity {
    position: absolute;
    z-index: 2;
    font-family: "Libre Baskerville", Georgia, serif;
    font-weight: 700;
    font-style: italic;
    line-height: .8;
    letter-spacing: -.09em;
    text-shadow: .04em .05em .025em rgba(0,0,0,.14);
  }
  .sr .hero-rarity { left: -1%; bottom: 1%; color: #172e99; font-size: clamp(92px, 12vw, 280px); }
  .a .hero-rarity { right: 7%; top: 1%; color: #27791e; font-size: clamp(100px, 12.5vw, 290px); }
  .ssr .hero-rarity { left: -2%; bottom: 1%; color: #49a5a5; font-size: clamp(78px, 10.2vw, 240px); }
  @media (prefers-reduced-motion: reduce) {
    .hero-card { transition-duration: .01ms; }
    .hero-card.is-visible::after { animation: none; }
  }

  /* 第 12/13 个播放步骤共用一个舞台：论文截图从右下角展开。 */
  .step-slide img.step-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    clip-path: inset(100% 0 0 100% round 18px);
    filter: drop-shadow(-12px -10px 22px rgba(0, 0, 0, 0));
    transition:
      clip-path .72s cubic-bezier(.22, 1, .36, 1),
      filter .72s ease;
    z-index: 2;
  }
  .step-slide.step-revealed img.step-overlay {
    clip-path: inset(0 0 0 0 round 0);
    filter: drop-shadow(-12px -10px 22px rgba(0, 0, 0, .22));
  }
  body.fit-contain .step-slide img.step-overlay { object-fit: contain; }

  /* ========== 第 47 页：Task 拆分（HTML 分层，便于后续逐步加动效） ========== */
  .task-split-slide {
    /* 非 16:9 视口会在画布上下留边：顶部接白底，底部接 Now 区域。 */
    background: linear-gradient(to bottom, #fff 0 50%, #f3efea 50% 100%);
    color: #050505;
  }
  .task-split-canvas {
    position: relative;
    width: min(100vw, 177.7778vh);
    height: min(100vh, 56.25vw);
    overflow: hidden;
    background: linear-gradient(to bottom, #fff 0 53%, #f3efea 53% 100%);
  }
  .task-split-title {
    position: absolute;
    left: 4.25%;
    top: 3.2%;
    z-index: 2;
    font-size: clamp(54px, 7.15vw, 184px);
    line-height: 1;
    letter-spacing: -.035em;
    font-kerning: normal;
    text-rendering: geometricPrecision;
    white-space: nowrap;
  }
  .task-era {
    position: absolute;
    left: 3.35%;
    z-index: 2;
    font-size: clamp(32px, 3.25vw, 83px);
    line-height: 1;
    white-space: nowrap;
  }
  .task-era::before {
    content: "";
    position: absolute;
    left: -.16em;
    right: -.18em;
    bottom: -.12em;
    height: .56em;
    z-index: -1;
    transform: skewX(-13deg);
    border-radius: .08em;
  }
  .task-era.ancient { top: 17.8%; }
  .task-era.ancient::before { background: #a9c8ff; }
  .task-era.now {
    left: 3.2%;
    bottom: 6.2%;
    color: #050505;
  }
  .task-era.now::before { background: #db765b; }
  .task-flow {
    position: absolute;
    left: 0;
    right: 0;
    display: block;
  }
  .task-flow.top {
    top: 28.4%;
    height: 20.2%;
  }
  .task-flow.bottom {
    top: 56.2%;
    height: 29.8%;
  }
  .task-step {
    position: absolute;
    top: 0;
    height: 100%;
    text-align: center;
  }
  .task-step img {
    position: absolute;
    left: 0;
    right: 0;
    margin-inline: auto;
    display: block;
    max-width: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* 顶部素材统一以文字上方为基线：同类人物同尺寸，且到标签留白一致。 */
  .task-flow.top .task-step img {
    top: auto;
    bottom: 37%;
    width: auto;
    height: 110%;
    max-width: none;
  }
  .task-flow.top .task-step.review img {
    top: auto;
    bottom: 37%;
    width: auto;
    height: 90%;
    max-width: none;
  }
  .task-flow.bottom .task-step img { top: 34%; width: 86%; height: 69%; }
  .task-flow.bottom .task-step.plug img { width: 63%; }
  .task-flow.bottom .task-step.plug img { top: 35%; }
  .task-flow.bottom .task-step.review img { top: 26%; width: 96%; }
  .task-flow.bottom .task-step.thumb img {
    top: 25%;
    left: auto;
    right: -22%;
    margin-inline: 0;
    width: 100%;
    transform: scale(2.5);
    transform-origin: right center;
  }
  .task-label {
    position: absolute;
    left: 50%;
    width: max-content;
    transform: translateX(-50%);
    font-size: clamp(27px, 3.15vw, 80px);
    line-height: 1.02;
    letter-spacing: -.018em;
    font-kerning: normal;
    text-rendering: geometricPrecision;
    white-space: nowrap;
  }
  .task-flow.top .task-label { bottom: 0; }
  .task-flow.bottom .task-label { top: 0; min-height: 1.12em; }
  .task-label.agent { color: #7057d8; }

  .task-arrow {

    font-family: Arial, sans-serif;
    font-size: clamp(38px, 4.25vw, 108px);
    font-weight: 300;
    line-height: 1;
    transform: translateY(-50%);
  }
  /* 顶部箭头中心与标签文字行中心对齐。 */
  .task-flow.top .task-arrow { top: 85.9%; }
  .task-flow.bottom .task-arrow { top: 9%; }
  .task-flow.top > :nth-child(1) { left: 2%; width: 16%; }
  .task-flow.top > :nth-child(2) { left: 18.5%; }
  .task-flow.top > :nth-child(3) { left: 21.4%; width: 12%; }
  .task-flow.top > :nth-child(4) { left: 32.2%; }
  .task-flow.top > :nth-child(5) { left: 35.5%; width: 12%; }
  .task-flow.top > :nth-child(6) { left: 46.4%; }
  .task-flow.top > :nth-child(7) { left: 50.7%; width: 23.3%; }
  .task-flow.top > :nth-child(8) { left: 72.5%; }
  .task-flow.top > :nth-child(9) { left: 75%; width: 11.5%; }
  .task-flow.top > :nth-child(10) { left: 83.6%; }
  .task-flow.top > :nth-child(11) { left: 87.4%; width: 10%; }
  .task-flow.bottom > :nth-child(1) { left: 3%; width: 15%; }
  .task-flow.bottom > :nth-child(2) { left: 16.25%; }
  .task-flow.bottom > :nth-child(3) { left: 20.5%; width: 11%; }
  .task-flow.bottom > :nth-child(4) { left: 30.85%; }
  .task-flow.bottom > :nth-child(5) { left: 34.5%; width: 11%; }
  .task-flow.bottom > :nth-child(6) { left: 45.95%; }
  .task-flow.bottom > :nth-child(7) { left: 50%; width: 23.5%; }
  .task-flow.bottom > :nth-child(8) { left: 72.55%; }
  .task-flow.bottom > :nth-child(9) { left: 75.5%; width: 13%; }
  .task-flow.bottom > :nth-child(10) { left: 85.05%; }
  .task-flow.bottom > :nth-child(11) { left: 88.4%; width: 9.5%; }
  @media (prefers-reduced-motion: reduce) {
    .task-split-slide *, .task-split-slide *::before { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  /* ========== 第 51 页：先骑带后骑（复用第 47 页素材体系） ========== */
  .ride-slide {
    background: linear-gradient(to bottom, #fff 0 53%, #f3efea 53% 100%);
    color: #050505;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .ride-canvas {
    position: relative;
    width: min(100vw, 177.7778vh);
    height: min(100vh, 56.25vw);
    overflow: hidden;
  }
  .ride-title {
    position: absolute;
    left: 4.25%;
    top: 3.2%;
    z-index: 2;
    font-size: clamp(54px, 7.15vw, 184px);

    letter-spacing: -.035em;

  }
  .ride-era {
    position: absolute;
    left: 3.35%;
    z-index: 2;

  .ride-era::before {

  .ride-step img {

  .ride-flow.top .ride-step img { bottom: 37%; height: 58%; }
  .ride-flow.top .ride-step.scholar img { height: 85%; }
  .ride-flow.top .ride-step.approve img { height: 62%; }
  .ride-flow.bottom .ride-step img { top: 32%; height: 38%; }

  /* ========== Harness 出处（第 15–19 步）：同一组件的目录与四个 Tab 状态 ========== */
  .origin-slide {
    display: block;
    background: #d8d8d6;
    color: #11110f;
    padding: clamp(24px, 4vh, 58px) clamp(28px, 5vw, 96px);
  }
  .origin-header {
    display: flex;
    align-items: flex-end;
    margin-bottom: clamp(18px, 2.4vh, 34px);
  }
  .origin-title {
    border: 0;
    padding: 0;
    background: transparent;
    color: inherit;
    font-family: Georgia, "Songti SC", "STSong", serif;
    font-weight: 700;
    font-size: clamp(54px, 7.2vw, 132px);
    line-height: 1.08;
    letter-spacing: -.055em;
    white-space: nowrap;
    cursor: pointer;
    transition: transform .2s ease, opacity .2s ease;
  }
  .origin-title:hover { transform: translateX(4px); opacity: .74; }
  .origin-stage { height: calc(100vh - clamp(174px, 22vh, 244px)); min-height: 0; }
  .origin-panel { display: none; height: 100%; }
  .origin-panel.is-active { display: block; animation: origin-in .28s ease-out both; }
  @keyframes origin-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }

    -webkit-user-drag: none;
  }
  /* 封面标题是独立 DOM 图层，背景始终铺满，不跟随全局“适应”模式留边。 */
  body.fit-contain .cover .layer { object-fit: cover; }

  /* ========== System Prompt 趋势（第 29–30 页）：同一组件的两种状态 ========== */
  .prompt-slide {
    --paper: #f4f3ed;
    --ink: #11110f;
    --muted: #d9d5c8;
    --accent: #ce745e;
    background: var(--paper);
    color: var(--ink);
    display: grid;
    grid-template-rows: auto 1fr;
    padding: clamp(28px, 4.6vh, 72px) clamp(30px, 4.2vw, 92px);
    gap: clamp(22px, 3vh, 52px);
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .prompt-slide h2 {
    font-size: clamp(44px, 6.4vw, 116px);
    line-height: .94;
    letter-spacing: -.035em;
    font-weight: 700;
    white-space: nowrap;
  }
  .prompt-layout {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(190px, 22%) 1fr;
    gap: clamp(38px, 6vw, 120px);
    align-items: center;
  }
  .prompt-stage { min-width: 0; }
  .prompt-panel.is-active { animation: prompt-panel-in .28s ease-out both; }
  .prompt-panel:not(.is-active) { display: none; }
  @keyframes prompt-panel-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .speaker-card {
    width: min(100%, 400px);
    justify-self: start;
    background: #fff;
    border-radius: clamp(16px, 1.5vw, 28px);
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(38, 34, 24, .04);
  }
  .speaker-card img {
    width: 100%;
    aspect-ratio: 1 / 1.02;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .speaker-meta { padding: clamp(12px, 1.25vw, 24px) clamp(14px, 1.5vw, 28px) clamp(16px, 1.6vw, 30px); }
  .speaker-meta strong { display: block; font-size: clamp(20px, 1.9vw, 36px); line-height: 1.08; }
  .speaker-meta .company { position: relative; display: inline-block; margin-top: .18em; z-index: 0; }
  .speaker-meta .company::after {
    content: "";
    position: absolute;
    z-index: -1;
    left: -.12em; right: -.12em; bottom: -.04em;
    height: .36em;
    border-radius: 4px;
    background: #f4c3ad;
    transform: rotate(-1deg);
  }
  .speaker-meta p { margin-top: .75em; font-size: clamp(13px, 1.08vw, 21px); font-weight: 700; line-height: 1.42; }

  .removed-content {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) minmax(220px, .72fr);
    gap: clamp(32px, 5vw, 96px);
    align-items: center;
  }
  .removed-copy {
    font-size: clamp(42px, 5.15vw, 96px);
    line-height: .98;
    letter-spacing: -.045em;
    max-width: 9.4em;
  }

  .doc-icon {
    --doc-line: var(--muted);
    position: relative;
    width: min(100%, 320px);
    aspect-ratio: .72;
    margin: auto;
    background: #fff;
    border: 2px solid rgba(90, 82, 63, .13);
    border-radius: 8%;
    box-shadow: 0 2px 7px rgba(40, 35, 24, .04);
    padding: 13% 10%;
    display: flex;
    flex-direction: column;
    gap: 6.2%;
  }
  .doc-line { height: 3.2%; min-height: 4px; border-radius: 99px; background: var(--doc-line); }
  .doc-line.dark { height: 4%; background: #0e0e0d; }
  .doc-line.short { width: 76%; }
  .doc-line.mid { width: 88%; }
  .doc-icon.crossed::before,
  .doc-icon.crossed::after {
    content: "";
    position: absolute;
    left: 7%; top: 54%;
    width: 87%; height: 2px;
    background: var(--accent);
    transform: rotate(13deg);
    transform-origin: center;
  }
  .doc-icon.crossed::after { transform: rotate(-13deg); }

  .trend-content {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: clamp(22px, 3vw, 64px);
    align-items: start;
  }
  .trend-step { min-width: 0; text-align: center; position: relative; }
  .trend-step:not(:last-child)::after {
    content: "→";
    position: absolute;
    right: calc(clamp(22px, 3vw, 64px) * -.68);
    top: 24%;
    color: var(--accent);
    font-family: Arial, sans-serif;
    font-size: clamp(38px, 4vw, 72px);
    font-weight: 300;
  }
  .trend-visual {
    height: clamp(210px, 31vh, 390px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 1.4vw, 26px);
  }
  .trend-step .doc-icon { width: clamp(88px, 8.7vw, 160px); margin: 0; }
  .trend-step.large .doc-icon { width: clamp(120px, 11.8vw, 215px); }
  .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .tool {
    width: clamp(34px, 3.1vw, 54px); aspect-ratio: 1;
    border: 2px solid #d6d3ca; border-radius: 18%;
    display: grid; place-items: center;
    font-family: Arial, sans-serif; font-size: clamp(21px, 2vw, 36px); line-height: 1;
  }
  .cards { display: flex; gap: 8px; align-self: end; margin-bottom: 3%; }
  .mini-card { width: clamp(70px, 6.6vw, 118px); aspect-ratio: 1.55; border: 2px solid var(--accent); border-radius: 9px; background: #fff; padding: 13%; }
  .mini-card:nth-child(2) { margin-left: -22%; transform: translateY(16%); }
  .mini-card i { display: block; height: 5px; margin-bottom: 10%; border-radius: 9px; background: var(--muted); }
  .mini-card i:first-child { width: 68%; background: var(--accent); }
  .search-mark { position: relative; width: clamp(90px, 8vw, 145px); aspect-ratio: 1; }
  .search-mark::before { content: ""; position: absolute; width: 48%; aspect-ratio: 1; border: 5px solid var(--accent); border-radius: 50%; left: 12%; top: 8%; }
  .search-mark::after { content: ""; position: absolute; width: 47%; height: 5px; border-radius: 9px; background: var(--accent); transform: rotate(47deg); left: 49%; top: 61%; transform-origin: left center; }
  .trend-step h3 { margin: .1em auto 0; max-width: 15em; font-size: clamp(19px, 1.8vw, 34px); line-height: 1.13; }

  @media (max-aspect-ratio: 4/3) {
    .prompt-slide { padding-inline: clamp(24px, 4vw, 52px); }
    .prompt-slide h2 { font-size: clamp(40px, 7.2vw, 80px); }
    .prompt-layout { grid-template-columns: minmax(150px, 24%) 1fr; gap: clamp(24px, 4vw, 52px); }
    .removed-content { grid-template-columns: 1fr; }
    .removed-content .doc-icon { width: min(42%, 230px); }
    .trend-visual { height: clamp(190px, 25vh, 300px); }
  }

  .metal {
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #292821;
    text-shadow:
      0 1px 0 rgba(255, 255, 255, .5),
      0 5px 14px rgba(38, 36, 30, .2);
  }

  .cover .t1 {
    position: absolute;
    top: 34%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(52px, 9.5vw, 170px);
    white-space: nowrap;
    z-index: 4;
  }

  /* 页码指示 */
  #counter {
    position: fixed;
    right: 22px;
    bottom: 18px;
    color: rgba(255, 255, 255, 0.55);
    font-size: 13px;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* 底部通栏进度条 */
  #progress {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.14);
    z-index: 10;
    pointer-events: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, rgba(255,255,255,0.55), rgba(255,255,255,0.9));
    width: 0;
    transition: width 0.55s cubic-bezier(0.33, 1, 0.68, 1);
  }

  /* 模式切换提示 */
  #toast {
    position: fixed;
    left: 50%;
    top: 40px;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.9);
    background: rgba(20, 20, 20, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(6px);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  #toast.show { opacity: 1; }
</style>
</head>

<script>

  function escapeWorkflowHtml(value) {

  async function initWorkflowFanout() {
    const root = document.getElementById('wfFoLanes');
    if (!root) return;
    const sync = document.getElementById('wfFoSync');
    const play = document.getElementById('wfFoPlay');
    const reset = document.getElementById('wfFoReset');
    const count = document.getElementById('wfFoCount');
    const bar = document.getElementById('wfFoBar');
    let data;
    try {
      data = await fetch('assets/workflow/chain-data.json').then(function (response) {
        if (!response.ok) throw new Error('workflow data ' + response.status);
        return response.json();
      });
    } catch (error) {
      count.textContent = '数据加载失败';
      play.disabled = true;
      reset.disabled = true;
      return;
    }
    const lanes = data.real.zonesFull.map(function (zone) {
      const total = zone.confirmed + zone.rejected;
      const findDuration = 1.4 + total * .22;
      const sequence = [];
      let confirmed = zone.confirmed;
      let rejected = zone.rejected;
      while (confirmed || rejected) {
        if (confirmed) { sequence.push('ok'); confirmed -= 1; }
        if (rejected) { sequence.push('no'); rejected -= 1; }
      }
      return {
        zone: zone,
        findEnd: findDuration,
        verifies: sequence.map(function (result, index) {
          return { result: result, start: findDuration + .06 * index, end: findDuration + .06 * index + 1 };
        })
      };
    });
    const maxTime = Math.max.apply(null, lanes.map(function (lane) {
      return lane.verifies.length
        ? Math.max.apply(null, lane.verifies.map(function (verify) { return verify.end; }))
        : lane.findEnd;
    }));
    let animationFrame = null;

    function buildWorkflowFanout() {
      root.innerHTML = lanes.map(function (lane, laneIndex) {
        const dots = lane.verifies.map(function (_, verifyIndex) {
          return '<span class="wf-v" id="wf_v_' + laneIndex + '_' + verifyIndex + '"></span>';
        }).join('');
        return '<div class="wf-lane"><div class="wf-find" id="wf_f_' + laneIndex + '" title="' + escapeWorkflowHtml(lane.zone.label) + '">find · ' + escapeWorkflowHtml(lane.zone.label) + '</div><div class="wf-verifies">' + dots + '</div></div>';
      }).join('');
      sync.innerHTML =
        '<span class="ln" id="wfLnPipe">await pipeline(ZONES,</span>\n' +
        '  <span class="ln" id="wfLnFind">(zone) =&gt; agent(findPrompt(zone), {…}),  <span class="cmt">// 第一层：11 个 find</span></span>\n' +
        '  <span class="ln" id="wfLnVerify">(res)  =&gt; parallel(res.findings.map(f =&gt;\n           agent(verifyPrompt(f), {…})))  <span class="cmt">// 第二层：每条发现 1 个 verify</span></span>\n)';
    }

    function renderWorkflowFanout(time) {
      let runningFind = false;
      let runningVerify = false;
      let spawned = 11;
      lanes.forEach(function (lane, laneIndex) {
        const find = document.getElementById('wf_f_' + laneIndex);
        if (time < lane.findEnd) {
          find.className = 'wf-find running';
          runningFind = true;
        } else {
          find.className = 'wf-find done';
        }
        lane.verifies.forEach(function (verify, verifyIndex) {
          const dot = document.getElementById('wf_v_' + laneIndex + '_' + verifyIndex);
          if (time < verify.start) {
            dot.className = 'wf-v';
          } else if (time < verify.end) {
            dot.className = 'wf-v spawned running';
            spawned += 1;
            runningVerify = true;
          } else {
            dot.className = 'wf-v spawned ' + verify.result;
            spawned += 1;
          }
        });
      });
      count.innerHTML = '当前 <b>' + spawned + '</b> 个 agent' +
        (runningFind ? ' · <span class="wf-status-find">find 执行中</span>' : '') +
        (runningFind && runningVerify ? ' + ' : (runningVerify ? ' · ' : '')) +
        (runningVerify ? '<span class="wf-status-verify">verify 执行中</span>' : '') +
        (!runningFind && !runningVerify && time > 0 ? ' · <span class="wf-status-done">全部完成（11 find + 70 verify）</span>' : '');
      document.getElementById('wfLnFind').className = 'ln' + (runningFind ? ' af' : '');
      document.getElementById('wfLnVerify').className = 'ln' + (runningVerify ? ' av' : '');
      bar.style.width = Math.min(100, time / maxTime * 100) + '%';
    }

    function resetWorkflowFanout() {
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = null;
      buildWorkflowFanout();
      count.textContent = '第一层：11 个 find agent · 等待播放';
      bar.style.width = '0';
      play.disabled = false;
    }

    function playWorkflowFanout() {
      resetWorkflowFanout();
      play.disabled = true;
      const startedAt = performance.now();
      const duration = 6200;
      function step(now) {
        const time = (now - startedAt) / duration * maxTime;
        renderWorkflowFanout(Math.min(time, maxTime));
        if (time < maxTime) animationFrame = requestAnimationFrame(step);
        else play.disabled = false;
      }
      animationFrame = requestAnimationFrame(step);
    }

    play.addEventListener('click', playWorkflowFanout);
    reset.addEventListener('click', resetWorkflowFanout);
    resetWorkflowFanout();
  }

  function initWorkflowLightbox() {
    const lightbox = document.getElementById('workflow-lightbox');
    const lightboxImage = lightbox.querySelector('img');
    const closeButton = lightbox.querySelector('button');
    function close() {
      lightbox.classList.remove('show');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
    }
    document.querySelectorAll('.workflow-shot, .workflow-real-shot').forEach(function (shot) {
      function open() {
        const image = shot.querySelector('img');
        lightboxImage.src = image.currentSrc || image.src;
        lightboxImage.alt = image.alt || '';
        lightbox.classList.add('show');
        lightbox.setAttribute('aria-hidden', 'false');
      }
      shot.addEventListener('click', open);
      shot.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          event.stopPropagation();
          open();
        }
      });
    });
    closeButton.addEventListener('click', close);
    lightbox.addEventListener('click', function (event) { if (event.target === lightbox) close(); });
    return { element: lightbox, close: close };
  }

  function clamp(n) { return Math.max(0, Math.min(TOTAL - 1, n)); }

  function go(n, instant) {
    n = clamp(n);
    if (n === current && !instant) return;
    const leavingFinalMap = isFinalMapCurrent();
    const previous = current;
    current = n;
    document.body.classList.toggle('workflow-mode', current >= 33 && current <= 35);

    originSlide.querySelectorAll('[data-origin-panel]').forEach(function (panel) {
      panel.classList.toggle('is-active', Number(panel.dataset.originPanel) === originState);
    });
    const originOffset = Math.max(0, Math.min(current - 14, 4));
    const physicalPage = current - (current > 11 ? 1 : 0) - originOffset - (current > 27 ? 1 : 0);
    const swappingStepState = (previous === 11 || previous === 12) && (current === 11 || current === 12);
    const swappingOriginState = previous >= 14 && previous <= 18 && current >= 14 && current <= 18;
    const swappingPromptState = (previous === 27 || previous === 28) && (current === 27 || current === 28);
    deck.style.transition = instant || swappingStepState || swappingOriginState || swappingPromptState ? 'none' : '';
    deck.style.transform = 'translateY(' + (-physicalPage * 100) + 'vh)';

    else if (isFinalMapCurrent() && mapRevealStep === 0) playMapReveal();
    else if (isFinalMapCurrent() && mapRevealStep === 1) expandMapReveal();
    else go(current + 1);
  }

  function retreat() {
    if (current === 7 && contextVideoSlide.classList.contains('video-playing')) resetAttentionVideo();

      return;
    }
    if ((e.key === 'Enter' || e.key === ' ') && e.target.closest && e.target.closest('.workflow-slide button, .workflow-slide a, .workflow-shot, .workflow-real-shot, .subagent-link')) {
      return;
    }
    if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      setFit(document.body.classList.contains('fit-contain') ? 'cover' : 'contain');
      return;
    }
    if (e.key === ' ' && current === 7 && contextVideoSlide.classList.contains('video-playing')) {
      e.preventDefault();
      if (attentionVideo.paused) {
        if (attentionVideo.ended) attentionVideo.currentTime = 0;
        attentionVideo.play().catch(function () {});
        showToast('继续播放');
      } else {
        attentionVideo.pause();
        showToast('已暂停');
      }
      return;
    }
    switch (e.key) {
      case 'ArrowDown': case 'PageDown': case ' ': case 'Enter':
        e.preventDefault(); advance(); break;
      case 'ArrowUp': case 'PageUp':
        e.preventDefault(); retreat(); break;
      case 'Home':
        e.preventDefault(); go(0); break;
      case 'End':
        e.preventDefault(); go(TOTAL - 1); break;
    }
  });

  // 滚轮（节流：一次滚动只翻一页）
  let wheelLock = false;
  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    if (wheelLock || Math.abs(e.deltaY) < 12) return;
    wheelLock = true;
    if (e.deltaY > 0) advance();
    else retreat();
    setTimeout(function () { wheelLock = false; }, 620);
  }, { passive: false });

  // 触摸滑动
  let touchY = null;
  window.addEventListener('touchstart', function (e) {
    touchY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', function (e) {
    if (touchY === null) return;
    const dy = touchY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 40) {
      if (dy > 0) advance();
      else retreat();
    }
    touchY = null;
  }, { passive: true });

  // 支持 #页码 直达（含手动改地址栏 hash）
  window.addEventListener('hashchange', function () {
    const n = parseInt(location.hash.slice(1), 10);
    if (!isNaN(n)) go(n - 1);
  });
  const start = parseInt(location.hash.slice(1), 10);
  go(isNaN(start) ? 0 : start - 1, true);
})();
</script>

</body>
</html>
