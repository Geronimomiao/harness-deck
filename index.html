<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊聊 Harness — Harness Engineering</title>
<style>
  /* 拉丁字符使用内置的 Libre Baskerville；中文使用本机已授权的锐宋粗。 */
  @font-face {
    font-family: "Deck Serif";
    src:
      url("assets/fonts/Reeji-CloudRuiSongCu-GBK.ttf") format("truetype"),
      local("锐字云字库锐宋粗GBK"),
      local("锐字云字库锐宋粗"),
      local("REEJI-RuiSongCuGBK"),
      local("REEJI-RuiSongCu");
    font-style: normal;
    font-weight: 700;
    unicode-range: U+2E80-2EFF, U+3000-303F, U+31C0-31EF, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF, U+FE30-FE4F, U+20000-2FA1F;
  }
  @font-face {
    font-family: "Deck Serif";
    src: url("assets/fonts/LibreBaskerville-wght.ttf") format("truetype");
    font-style: normal;
    font-weight: 400 700;
    font-display: swap;
    unicode-range: U+0000-024F, U+1E00-1EFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: clip;
    background: #1a1917;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
    font-weight: 700;
  }

  body {
    position: fixed;
    inset: 0;
    width: 100%;
  }

  #deck {
    height: 100%;
    transition: transform 0.55s cubic-bezier(0.33, 1, 0.68, 1);
    will-change: transform;
  }

  .slide {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 氛围底：当前页的模糊放大版，填满黑边区域 */
  .slide img.ambient {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(28px) brightness(0.72) saturate(1.15);
    transform: scale(1.12);
  }
  .slide img.main {
    position: relative;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  body.fit-contain .slide img.main { object-fit: contain; }
  body .slide.edge-fill img.main { object-fit: cover; }

  /* 第 2、3 页是上下连续构图：上一页锁定底边，下一页锁定顶边。 */
  body .slide.stitch-slide img.main {
    position: absolute;
    left: 0;
    width: 100%;
    height: auto;
    object-fit: fill;
  }
  .slide.stitch-upper { background: #b3aeaf; }
  .slide.stitch-upper img.main { bottom: 0; }
  .slide.stitch-lower { background: #dadada; }
  .slide.stitch-lower img.main { top: 0; }
  .stitch-upper-copy {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    aspect-ratio: 2560 / 1733;
    z-index: 2;
    pointer-events: none;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .stitch-upper-copy .corner {
    position: absolute;
    top: 20%;
    font-family: "Libre Baskerville", Georgia, serif;
    font-size: clamp(34px, 5.3vw, 136px);
    font-style: italic;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 .05em .04em rgba(84, 80, 80, .28);
  }
  .stitch-upper-copy .corner.l { left: 3.8%; }
  .stitch-upper-copy .corner.r { right: 3.8%; }
  .stitch-upper-copy .headline {
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: 76%;
    text-align: center;
    color: #f4f3f1;
    font-size: clamp(58px, 8vw, 205px);
    font-weight: 700;
    line-height: .84;
    letter-spacing: -.04em;
    text-shadow:
      0 .035em 0 #d7d7d5,
      .025em .07em .025em rgba(52, 53, 52, .72),
      0 .1em .1em rgba(33, 34, 33, .25);
  }
  .stitch-upper-copy .headline span { display: block; }

  /* 第 8 页：纯标题首帧，按键后播放注意力机制片段。 */
  .context-video-slide { background: #000; }
  .context-video-slide > img.main,
  .context-video-slide > img.ambient { display: none; }
  .attention-title {
    position: absolute;
    left: 5.7%;
    top: 49%;
    z-index: 2;
    color: #f7f6f1;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
    font-size: clamp(58px, 7.15vw, 132px);
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -.04em;
    white-space: nowrap;
    transform: translateY(-50%);
  }
  .attention-video-shell {
    position: absolute;
    inset: 0;
    z-index: 6;
    overflow: hidden;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .28s ease;
  }
  .context-video-slide.video-playing .attention-video-shell { opacity: 1; }
  .attention-video-shell video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  /* ========== 第 42 页：从左到右抽取英雄卡 ========== */
  .hero-card-slide {
    background: #000;
    overflow: clip;
    color: #fff;
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .hero-card-title {
    position: absolute;
    top: 6.5%;
    left: 5.4%;
    z-index: 5;
    font-size: clamp(52px, 6.4vw, 150px);
    line-height: .9;
    font-weight: 700;
    letter-spacing: -.045em;
  }
  .hero-card-stage {
    position: absolute;
    inset: 13% 2.2% 5%;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0;
    align-items: end;
    perspective: 1800px;
  }
  .hero-card {
    --tilt: 0deg;
    --start-x: 0%;
    --rest-x: 0%;
    --lift: 0%;
    --rest-scale: 1;
    position: relative;
    height: 96%;
    width: auto;
    aspect-ratio: .66;
    justify-self: center;
    overflow: hidden;
    border-radius: clamp(24px, 2.5vw, 58px);
    box-shadow: 0 2.2vw 4vw rgba(0, 0, 0, .68);
    opacity: 0;
    transform-origin: 50% 100%;
    transform: translate(var(--start-x), 34%) scale(.18) rotateY(88deg) rotateZ(var(--tilt));
    transition:
      transform .9s cubic-bezier(.18, .9, .2, 1.12),
      opacity .18s ease-out;
    will-change: transform, opacity;
  }
  .hero-card::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 3;
    border: 1px solid rgba(255, 255, 255, .68);
    border-radius: inherit;
    pointer-events: none;
  }
  .hero-card::after {
    content: "";
    position: absolute;
    inset: -35%;
    z-index: 4;
    background: linear-gradient(110deg, transparent 38%, rgba(255,255,255,.68) 49%, transparent 60%);
    transform: translateX(-85%) rotate(8deg);
    opacity: 0;
    pointer-events: none;
  }
  .hero-card.is-visible {
    opacity: 1;
    transform: translate(var(--rest-x), var(--lift)) scale(var(--rest-scale)) rotateY(0) rotateZ(var(--tilt));
  }
  .hero-card.is-visible::after { animation: card-shine .78s .34s ease-out; }
  @keyframes card-shine {
    0% { opacity: 0; transform: translateX(-85%) rotate(8deg); }
    28% { opacity: .75; }
    100% { opacity: 0; transform: translateX(85%) rotate(8deg); }
  }
  .hero-card.sr {
    --tilt: 2.4deg;
    --start-x: 112%;
    --rest-x: -4%;
    --lift: 1%;
    --rest-scale: .9;
    background: linear-gradient(145deg, #f2efff 0%, #eef4ff 48%, #cbd0ff 100%);
    justify-self: start;
    z-index: 1;
  }
  .hero-card.a {
    --tilt: -7deg;
    --rest-x: 0%;
    background: linear-gradient(150deg, #fffdf2 0%, #efffdc 55%, #a9ff62 100%);
    z-index: 2;
  }
  .hero-card.ssr {
    --tilt: 3deg;
    --start-x: -112%;
    --rest-x: -8%;
    --rest-scale: .96;
    background: linear-gradient(145deg, #eefeff 0%, #e5fbf5 48%, #b7f2ef 100%);
    justify-self: end;
    z-index: 1;
    overflow: visible;
  }
  .hero-card img {
    position: absolute;
    z-index: 1;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .hero-card.sr img { left: -22%; bottom: -22%; width: 152%; }
  .hero-card.a img { left: -38%; bottom: -20%; width: 175%; }
  .hero-card.ssr img {
    right: -12%;
    bottom: -2%;
    width: 132%;
    clip-path: inset(-100% 9.1% 1.57% -100% round 0 0 6% 0);
  }
  .hero-rarity {
    position: absolute;
    z-index: 2;
    font-family: "Libre Baskerville", Georgia, serif;
    font-weight: 700;
    font-style: italic;
    line-height: .8;
    letter-spacing: -.09em;
    text-shadow: .04em .05em .025em rgba(0,0,0,.14);
  }
  .sr .hero-rarity { left: -1%; bottom: 1%; color: #172e99; font-size: clamp(92px, 12vw, 280px); }
  .a .hero-rarity { right: 7%; top: 1%; color: #27791e; font-size: clamp(100px, 12.5vw, 290px); }
  .ssr .hero-rarity { left: -2%; bottom: 1%; color: #49a5a5; font-size: clamp(78px, 10.2vw, 240px); }
  @media (prefers-reduced-motion: reduce) {
    .hero-card { transition-duration: .01ms; }
    .hero-card.is-visible::after { animation: none; }
  }

  /* 第 12/13 个播放步骤共用一个舞台：论文截图从右下角展开。 */
  .step-slide img.step-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
    clip-path: inset(100% 0 0 100% round 18px);
    filter: drop-shadow(-12px -10px 22px rgba(0, 0, 0, 0));
    transition:
      clip-path .72s cubic-bezier(.22, 1, .36, 1),
      filter .72s ease;
    z-index: 2;
  }
  .step-slide.step-revealed img.step-overlay {
    clip-path: inset(0 0 0 0 round 0);
    filter: drop-shadow(-12px -10px 22px rgba(0, 0, 0, .22));
  }
  body.fit-contain .step-slide img.step-overlay { object-fit: contain; }

  /* ========== 第 47 页：Task 拆分（HTML 分层，便于后续逐步加动效） ========== */
  .task-split-slide {
    /* 非 16:9 视口会在画布上下留边：顶部接白底，底部接 Now 区域。 */
    background: linear-gradient(to bottom, #fff 0 50%, #f3efea 50% 100%);
    color: #050505;
  }
  .task-split-canvas {
    position: relative;
    width: min(100vw, 177.7778vh);
    height: min(100vh, 56.25vw);
    overflow: hidden;
    background: linear-gradient(to bottom, #fff 0 53%, #f3efea 53% 100%);
  }
  .task-split-title {
    position: absolute;
    left: 4.25%;
    top: 3.2%;
    z-index: 2;
    font-size: clamp(54px, 7.15vw, 184px);
    line-height: 1;
    letter-spacing: -.035em;
    font-kerning: normal;
    text-rendering: geometricPrecision;
    white-space: nowrap;
  }
  .task-era {
    position: absolute;
    left: 3.35%;
    z-index: 2;
    font-size: clamp(32px, 3.25vw, 83px);
    line-height: 1;
    white-space: nowrap;
  }
  .task-era::before {
    content: "";
    position: absolute;
    left: -.16em;
    right: -.18em;
    bottom: -.12em;
    height: .56em;
    z-index: -1;
    transform: skewX(-13deg);
    border-radius: .08em;
  }
  .task-era.ancient { top: 17.8%; }
  .task-era.ancient::before { background: #a9c8ff; }
  .task-era.now {
    left: 3.2%;
    bottom: 6.2%;
    color: #050505;
  }
  .task-era.now::before { background: #db765b; }
  .task-flow {
    position: absolute;
    left: 0;
    right: 0;
    display: block;
  }
  .task-flow.top {
    top: 28.4%;
    height: 20.2%;
  }
  .task-flow.bottom {
    top: 56.2%;
    height: 29.8%;
  }
  .task-step {
    position: absolute;
    top: 0;
    height: 100%;
    text-align: center;
  }
  .task-step img {
    position: absolute;
    left: 0;
    right: 0;
    margin-inline: auto;
    display: block;
    max-width: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* 顶部素材统一以文字上方为基线：同类人物同尺寸，且到标签留白一致。 */
  .task-flow.top .task-step img {
    top: auto;
    bottom: 37%;
    width: auto;
    height: 110%;
    max-width: none;
  }
  .task-flow.top .task-step.review img {
    top: auto;
    bottom: 37%;
    width: auto;
    height: 90%;
    max-width: none;
  }
  .task-flow.bottom .task-step img { top: 34%; width: 86%; height: 69%; }
  .task-flow.bottom .task-step.plug img { width: 63%; }
  .task-flow.bottom .task-step.plug img { top: 35%; }
  .task-flow.bottom .task-step.review img { top: 26%; width: 96%; }
  .task-flow.bottom .task-step.thumb img {
    top: 25%;
    left: auto;
    right: -22%;
    margin-inline: 0;
    width: 100%;
    transform: scale(2.5);
    transform-origin: right center;
  }
  .task-label {
    position: absolute;
    left: 50%;
    width: max-content;
    transform: translateX(-50%);
    font-size: clamp(27px, 3.15vw, 80px);
    line-height: 1.02;
    letter-spacing: -.018em;
    font-kerning: normal;
    text-rendering: geometricPrecision;
    white-space: nowrap;
  }
  .task-flow.top .task-label { bottom: 0; }
  .task-flow.bottom .task-label { top: 0; min-height: 1.12em; }
  .task-label.agent { color: #7057d8; }
  .task-label.figma { color: #db765b; }
  .task-step.plug .task-label { color: #db765b; }
  .task-arrow {
    position: absolute;
    width: 4.2%;
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: clamp(38px, 4.25vw, 108px);
    font-weight: 300;
    line-height: 1;
    transform: translateY(-50%);
  }
  /* 顶部箭头中心与标签文字行中心对齐。 */
  .task-flow.top .task-arrow { top: 85.9%; }
  .task-flow.bottom .task-arrow { top: 9%; }
  .task-flow.top > :nth-child(1) { left: 2%; width: 16%; }
  .task-flow.top > :nth-child(2) { left: 18.5%; }
  .task-flow.top > :nth-child(3) { left: 21.4%; width: 12%; }
  .task-flow.top > :nth-child(4) { left: 32.2%; }
  .task-flow.top > :nth-child(5) { left: 35.5%; width: 12%; }
  .task-flow.top > :nth-child(6) { left: 46.4%; }
  .task-flow.top > :nth-child(7) { left: 50.7%; width: 23.3%; }
  .task-flow.top > :nth-child(8) { left: 72.5%; }
  .task-flow.top > :nth-child(9) { left: 75%; width: 11.5%; }
  .task-flow.top > :nth-child(10) { left: 83.6%; }
  .task-flow.top > :nth-child(11) { left: 87.4%; width: 10%; }
  .task-flow.bottom > :nth-child(1) { left: 3%; width: 15%; }
  .task-flow.bottom > :nth-child(2) { left: 16.25%; }
  .task-flow.bottom > :nth-child(3) { left: 20.5%; width: 11%; }
  .task-flow.bottom > :nth-child(4) { left: 30.85%; }
  .task-flow.bottom > :nth-child(5) { left: 34.5%; width: 11%; }
  .task-flow.bottom > :nth-child(6) { left: 45.95%; }
  .task-flow.bottom > :nth-child(7) { left: 50%; width: 23.5%; }
  .task-flow.bottom > :nth-child(8) { left: 72.55%; }
  .task-flow.bottom > :nth-child(9) { left: 75.5%; width: 13%; }
  .task-flow.bottom > :nth-child(10) { left: 85.05%; }
  .task-flow.bottom > :nth-child(11) { left: 88.4%; width: 9.5%; }
  @media (prefers-reduced-motion: reduce) {
    .task-split-slide *, .task-split-slide *::before { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  /* ========== 终页：从火把附近逐步揭开的探索地图 ========== */
  .final-map-slide img.main { z-index: 1; }
  .final-map-slide .map-reveal {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    -webkit-mask-image:
      radial-gradient(ellipse, #000 0 48%, rgba(0,0,0,.86) 56%, transparent 72%),
      radial-gradient(ellipse, #000 0 45%, rgba(0,0,0,.78) 55%, transparent 72%),
      radial-gradient(ellipse, #000 0 46%, rgba(0,0,0,.72) 54%, transparent 71%);
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: 75% 60%, 69% 67%, 82% 48%;
    -webkit-mask-size: 5% 8%, 4% 7%, 3% 5%;
    mask-image:
      radial-gradient(ellipse, #000 0 48%, rgba(0,0,0,.86) 56%, transparent 72%),
      radial-gradient(ellipse, #000 0 45%, rgba(0,0,0,.78) 55%, transparent 72%),
      radial-gradient(ellipse, #000 0 46%, rgba(0,0,0,.72) 54%, transparent 71%);
    mask-repeat: no-repeat;
    mask-position: 75% 60%, 69% 67%, 82% 48%;
    mask-size: 5% 8%, 4% 7%, 3% 5%;
    opacity: 0;
  }
  .final-map-slide .exploration-map {
    position: absolute;
    left: 25%;
    top: 36%;
    width: 74%;
    height: 62%;
    object-fit: contain;
    object-position: right bottom;
    opacity: .68;
    filter: blur(.15px) drop-shadow(0 0 5px rgba(255, 238, 190, .14));
  }
  .final-map-slide .map-glow {
    position: absolute;
    left: 72%;
    top: 57%;
    width: 13vmin;
    height: 13vmin;
    z-index: 3;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,244,211,.25), rgba(255,221,174,.09) 42%, transparent 72%);
    transform: translate(-50%, -50%) scale(.72);
    opacity: 0;
  }
  .final-map-slide.is-revealing .map-reveal,
  .final-map-slide.is-revealed .map-reveal {
    opacity: 1;
    -webkit-mask-size: 136% 154%, 105% 128%, 92% 112%;
    mask-size: 136% 154%, 105% 128%, 92% 112%;
    transition:
      -webkit-mask-size 5.6s cubic-bezier(.2,.72,.18,1),
      mask-size 5.6s cubic-bezier(.2,.72,.18,1),
      opacity .45s ease;
  }
  .final-map-slide.is-revealing .map-glow {
    animation: map-glow 5.6s ease-out both;
  }
  @keyframes map-glow {
    0% { opacity: .25; transform: translate(-50%, -50%) scale(.72); }
    22% { opacity: .72; }
    72% { opacity: .18; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(5.8); }
  }
  @media (prefers-reduced-motion: reduce) {
    .step-slide img.step-overlay { transition-duration: .01ms; }
    .final-map-slide.is-revealing .map-reveal,
    .final-map-slide.is-revealed .map-reveal { transition-duration: .01ms; }
    .final-map-slide.is-revealing .map-glow { animation-duration: .01ms; }
  }

  /* 原稿本身是纯色背景的页面：保留整张内容图，外侧留白使用同色填充。 */
  .slide.solid-bg img.main { object-fit: contain; }
  .slide.dual-bg { background: linear-gradient(to bottom, #fff 0 50%, #f4e9ea 50% 100%); }
  .slide.dual-bg-51 { background: linear-gradient(to bottom, #fff 0 52.57%, #f3efea 52.57% 100%); }
  .slide.dual-bg-horizontal {
    background: linear-gradient(to right, #d4c6c9 0 50%, #dadada 50% 100%);
  }
  .slide.gradient-bg {
    background: linear-gradient(to bottom, #417a97 0%, #82adbc 50%, #c3dee2 100%);
  }
  @media (max-aspect-ratio: 16/9) {
    .slide.dual-bg-51 {
      background: linear-gradient(
        to bottom,
        #fff 0 calc((100vh - 56.25vw) / 2 + 29.57vw),
        #f3efea calc((100vh - 56.25vw) / 2 + 29.57vw) 100%
      );
    }
    .slide.gradient-bg {
      background: linear-gradient(
        to bottom,
        #417a97 0 calc((100vh - 56.25vw) / 2),
        #82adbc 50%,
        #c3dee2 calc((100vh + 56.25vw) / 2) 100%
      );
    }
  }
  @media (min-aspect-ratio: 16/9) {
    .slide.dual-bg { background: linear-gradient(to bottom, #fff 0 20.5%, #f4e9ea 20.5% 100%); }
  }

  /* ========== 扉页（第 1 页）：背景 + 标题 ========== */
  .cover .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* 封面标题是独立 DOM 图层，背景始终铺满，不跟随全局“适应”模式留边。 */
  body.fit-contain .cover .layer { object-fit: cover; }

  /* ========== System Prompt 趋势（第 29–30 页）：同一组件的两种状态 ========== */
  .prompt-slide {
    --paper: #f4f3ed;
    --ink: #11110f;
    --muted: #d9d5c8;
    --accent: #ce745e;
    background: var(--paper);
    color: var(--ink);
    display: grid;
    grid-template-rows: auto 1fr;
    padding: clamp(28px, 4.6vh, 72px) clamp(30px, 4.2vw, 92px);
    gap: clamp(22px, 3vh, 52px);
    font-family: "Deck Serif", "Songti SC", "STSong", serif;
  }
  .prompt-slide h2 {
    font-size: clamp(44px, 6.4vw, 116px);
    line-height: .94;
    letter-spacing: -.035em;
    font-weight: 700;
    white-space: nowrap;
  }
  .prompt-layout {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(190px, 22%) 1fr;
    gap: clamp(38px, 6vw, 120px);
    align-items: center;
  }
  .prompt-stage { min-width: 0; }
  .prompt-panel.is-active { animation: prompt-panel-in .28s ease-out both; }
  .prompt-panel:not(.is-active) { display: none; }
  @keyframes prompt-panel-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .speaker-card {
    width: min(100%, 400px);
    justify-self: start;
    background: #fff;
    border-radius: clamp(16px, 1.5vw, 28px);
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(38, 34, 24, .04);
  }
  .speaker-card img {
    width: 100%;
    aspect-ratio: 1 / 1.02;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .speaker-meta { padding: clamp(12px, 1.25vw, 24px) clamp(14px, 1.5vw, 28px) clamp(16px, 1.6vw, 30px); }
  .speaker-meta strong { display: block; font-size: clamp(20px, 1.9vw, 36px); line-height: 1.08; }
  .speaker-meta .company { position: relative; display: inline-block; margin-top: .18em; z-index: 0; }
  .speaker-meta .company::after {
    content: "";
    position: absolute;
    z-index: -1;
    left: -.12em; right: -.12em; bottom: -.04em;
    height: .36em;
    border-radius: 4px;
    background: #f4c3ad;
    transform: rotate(-1deg);
  }
  .speaker-meta p { margin-top: .75em; font-size: clamp(13px, 1.08vw, 21px); font-weight: 700; line-height: 1.42; }

  .removed-content {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) minmax(220px, .72fr);
    gap: clamp(32px, 5vw, 96px);
    align-items: center;
  }
  .removed-copy {
    font-size: clamp(42px, 5.15vw, 96px);
    line-height: .98;
    letter-spacing: -.045em;
    max-width: 9.4em;
  }

  .doc-icon {
    --doc-line: var(--muted);
    position: relative;
    width: min(100%, 320px);
    aspect-ratio: .72;
    margin: auto;
    background: #fff;
    border: 2px solid rgba(90, 82, 63, .13);
    border-radius: 8%;
    box-shadow: 0 2px 7px rgba(40, 35, 24, .04);
    padding: 13% 10%;
    display: flex;
    flex-direction: column;
    gap: 6.2%;
  }
  .doc-line { height: 3.2%; min-height: 4px; border-radius: 99px; background: var(--doc-line); }
  .doc-line.dark { height: 4%; background: #0e0e0d; }
  .doc-line.short { width: 76%; }
  .doc-line.mid { width: 88%; }
  .doc-icon.crossed::before,
  .doc-icon.crossed::after {
    content: "";
    position: absolute;
    left: 7%; top: 54%;
    width: 87%; height: 2px;
    background: var(--accent);
    transform: rotate(13deg);
    transform-origin: center;
  }
  .doc-icon.crossed::after { transform: rotate(-13deg); }

  .trend-content {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: clamp(22px, 3vw, 64px);
    align-items: start;
  }
  .trend-step { min-width: 0; text-align: center; position: relative; }
  .trend-step:not(:last-child)::after {
    content: "→";
    position: absolute;
    right: calc(clamp(22px, 3vw, 64px) * -.68);
    top: 24%;
    color: var(--accent);
    font-family: Arial, sans-serif;
    font-size: clamp(38px, 4vw, 72px);
    font-weight: 300;
  }
  .trend-visual {
    height: clamp(210px, 31vh, 390px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 1.4vw, 26px);
  }
  .trend-step .doc-icon { width: clamp(88px, 8.7vw, 160px); margin: 0; }
  .trend-step.large .doc-icon { width: clamp(120px, 11.8vw, 215px); }
  .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .tool {
    width: clamp(34px, 3.1vw, 54px); aspect-ratio: 1;
    border: 2px solid #d6d3ca; border-radius: 18%;
    display: grid; place-items: center;
    font-family: Arial, sans-serif; font-size: clamp(21px, 2vw, 36px); line-height: 1;
  }
  .cards { display: flex; gap: 8px; align-self: end; margin-bottom: 3%; }
  .mini-card { width: clamp(70px, 6.6vw, 118px); aspect-ratio: 1.55; border: 2px solid var(--accent); border-radius: 9px; background: #fff; padding: 13%; }
  .mini-card:nth-child(2) { margin-left: -22%; transform: translateY(16%); }
  .mini-card i { display: block; height: 5px; margin-bottom: 10%; border-radius: 9px; background: var(--muted); }
  .mini-card i:first-child { width: 68%; background: var(--accent); }
  .search-mark { position: relative; width: clamp(90px, 8vw, 145px); aspect-ratio: 1; }
  .search-mark::before { content: ""; position: absolute; width: 48%; aspect-ratio: 1; border: 5px solid var(--accent); border-radius: 50%; left: 12%; top: 8%; }
  .search-mark::after { content: ""; position: absolute; width: 47%; height: 5px; border-radius: 9px; background: var(--accent); transform: rotate(47deg); left: 49%; top: 61%; transform-origin: left center; }
  .trend-step h3 { margin: .1em auto 0; max-width: 15em; font-size: clamp(19px, 1.8vw, 34px); line-height: 1.13; }

  @media (max-aspect-ratio: 4/3) {
    .prompt-slide { padding-inline: clamp(24px, 4vw, 52px); }
    .prompt-slide h2 { font-size: clamp(40px, 7.2vw, 80px); }
    .prompt-layout { grid-template-columns: minmax(150px, 24%) 1fr; gap: clamp(24px, 4vw, 52px); }
    .removed-content { grid-template-columns: 1fr; }
    .removed-content .doc-icon { width: min(42%, 230px); }
    .trend-visual { height: clamp(190px, 25vh, 300px); }
  }

  .metal {
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #292821;
    text-shadow:
      0 1px 0 rgba(255, 255, 255, .5),
      0 5px 14px rgba(38, 36, 30, .2);
  }

  .cover .t1 {
    position: absolute;
    top: 34%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(52px, 9.5vw, 170px);
    white-space: nowrap;
    z-index: 4;
  }

  /* 页码指示 */
  #counter {
    position: fixed;
    right: 22px;
    bottom: 18px;
    color: rgba(255, 255, 255, 0.55);
    font-size: 13px;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* 底部通栏进度条 */
  #progress {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 4px;
    background: rgba(255, 255, 255, 0.14);
    z-index: 10;
    pointer-events: none;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, rgba(255,255,255,0.55), rgba(255,255,255,0.9));
    width: 0;
    transition: width 0.55s cubic-bezier(0.33, 1, 0.68, 1);
  }

  /* 模式切换提示 */
  #toast {
    position: fixed;
    left: 50%;
    top: 40px;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.9);
    background: rgba(20, 20, 20, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(6px);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="deck">
  <section class="slide cover" id="cover">
    <img class="ambient" src="assets/cover/cover-bg-clean-blur.webp" alt="">
    <img class="layer bg" src="assets/cover/cover-bg-clean.webp" alt="">
    <div class="t1 metal">聊聊 Harness</div>
  </section>
</div>

<div id="counter">1 / 56</div>
<div id="progress"><div id="progress-bar"></div></div>
<div id="toast"></div>

<script>
(function () {
  const IMAGES = 56;            // 原稿截图页数
  const TOTAL = IMAGES;         // 删除原第 22 页后，共 56 个播放步骤
  const deck = document.getElementById('deck');
  const counter = document.getElementById('counter');
  const progressBar = document.getElementById('progress-bar');
  const EDGE_FILL_SLIDES = new Set([4, 46, 49]);
  const GRADIENT_BACKGROUND_SLIDES = new Set([11, 12, 23]);
  const STITCH_SLIDES = { 1: 'stitch-upper', 2: 'stitch-lower' };
  const SOLID_BACKGROUNDS = {
    3: 'dual-horizontal',
    5: '#dadada', 6: '#000000', 7: '#000000', 8: '#dadada', 9: '#dadada', 10: '#dadada',
    13: '#ffffff', 14: '#dadada', 15: '#dadada', 16: '#dadada', 17: '#dadada', 18: '#dadada',
    19: '#dadada', 20: '#dadada', 22: '#f4efff',
    24: 'dual',
    25: '#dadada', 26: '#dadada',
    27: '#dadada', 30: '#dadada', 31: '#dadada', 32: '#ffffff', 33: '#dadada', 34: '#dadada',
    35: '#dadada', 36: '#ffffff', 37: '#f0efe9', 38: '#dadada', 39: '#dadada', 40: '#dadada',
    41: '#dadada', 42: '#000000', 43: '#141412', 44: '#141412', 45: '#fbf9f5', 47: '#f3efea',
    48: '#dadada', 51: 'dual-51', 52: '#dadada', 53: '#000000', 54: '#000000', 55: '#ffffff',
    56: '#db7656'
  };

  function documentLines(crossed) {
    return '<div class="doc-icon' + (crossed ? ' crossed' : '') + '">' +
      '<i class="doc-line dark"></i><i class="doc-line dark short"></i>' +
      '<i class="doc-line"></i><i class="doc-line mid"></i><i class="doc-line"></i>' +
      '<i class="doc-line short"></i><i class="doc-line"></i><i class="doc-line mid"></i>' +
      '<i class="doc-line dark mid"></i><i class="doc-line"></i></div>';
  }

  function speakerCard() {
    return '<aside class="speaker-card"><img src="assets/system-prompt/thariq-shihipar.png" alt="Thariq Shihipar">' +
      '<div class="speaker-meta"><strong>Thariq Shihipar</strong><strong class="company">Anthropic</strong>' +
      '<p>Jul 2, 2026<br>AI Engineer<br>《Field Guide to Fabl》</p></div></aside>';
  }

  function createPromptSlide() {
    const s = document.createElement('section');
    s.className = 'slide prompt-slide';
    const removed = '<div class="prompt-panel removed-content is-active" data-prompt-panel="removed"><div class="removed-copy">We removed 80%<br>of the system<br>prompt from<br>Claude Code</div>' + documentLines(true) + '</div>';
    const trend = '<div class="prompt-panel trend-content" data-prompt-panel="trend">' +
          '<div class="trend-step"><div class="trend-visual"><div class="tool-grid"><span class="tool">○</span><span class="tool">／</span></div><div class="cards"><span class="mini-card"><i></i><i></i><i></i></span><span class="mini-card"><i></i><i></i><i></i></span></div></div><h3>Small system prompt,<br>few tools, lots of examples</h3></div>' +
          '<div class="trend-step large"><div class="trend-visual"><div class="tool-grid"><span class="tool">○</span><span class="tool">／</span><span class="tool">■</span><span class="tool">△</span><span class="tool">＋</span><span class="tool">●</span></div><div class="cards"><span class="mini-card"><i></i><i></i><i></i></span><span class="mini-card"><i></i><i></i><i></i></span></div></div><h3>Large system prompt,<br>lots of examples, many tools</h3></div>' +
          '<div class="trend-step"><div class="trend-visual">' + documentLines(false) + '<div class="tool-grid"><span class="tool">○</span><span class="tool"></span><span class="tool"></span><span class="tool"></span></div><span class="search-mark"></span></div><h3>Smaller system prompt,<br>tool search, no examples</h3></div>' +
        '</div>';
    s.innerHTML = '<h2>System Prompt 趋势</h2><div class="prompt-layout">' + speakerCard() + '<div class="prompt-stage">' + removed + trend + '</div></div>';
    return s;
  }

  function createHeroCardSlide() {
    const s = document.createElement('section');
    s.className = 'slide hero-card-slide card-step-0';
    s.innerHTML = '<h2 class="hero-card-title">选择你的英雄</h2>' +
      '<div class="hero-card-stage">' +
        '<article class="hero-card sr" data-card-index="1"><img src="assets/cards/horse-sr.png" alt="盘发棕马"><span class="hero-rarity">SR</span></article>' +
        '<article class="hero-card a" data-card-index="2"><img src="assets/cards/horse-a.png" alt="吐舌小马"><span class="hero-rarity">A</span></article>' +
        '<article class="hero-card ssr" data-card-index="3"><img src="assets/cards/horse-ssr.png" alt="白马"><span class="hero-rarity">SSR</span></article>' +
      '</div>';
    return s;
  }

  function createTaskSplitSlide() {
    const s = document.createElement('section');
    s.className = 'slide task-split-slide';
    const scholar = 'assets/task-split/ancient-scholar.png';
    const review = 'assets/task-split/ancient-review.png';
    const controller = 'assets/task-split/agent-controller.png';
    const step = function (className, label, image, alt) {
      return '<div class="task-step ' + className + '" data-task-step="' + className + '">' +
        (label ? '<div class="task-label ' + (className === 'agent' ? 'agent' : '') + '">' + label + '</div>' : '') +
        '<img src="' + image + '" alt="' + alt + '"></div>';
    };
    const arrow = '<div class="task-arrow" aria-hidden="true">→</div>';
    const top =
      step('design', '看设计图', scholar, '古代文人看设计图') + arrow +
      step('code', 'code', scholar, '古代文人编写代码') + arrow +
      step('self-test', '自测', scholar, '古代文人自测') + arrow +
      step('review', '其他部门验收', review, '其他部门验收') + arrow +
      step('revise', '改', scholar, '古代文人修改') + arrow +
      step('launch', '上线', scholar, '古代文人上线');
    const bottom =
      step('plug', 'Figma<br>MCP', 'assets/task-split/figma-plug.png', 'Figma MCP 插头') + arrow +
      step('agent', 'Agent', controller, 'Agent 控制器') + arrow +
      step('agent', 'Agent', controller, 'Agent 控制器') + arrow +
      step('review', '其他部门验收', review, '其他部门验收') + arrow +
      step('agent', 'Agent', controller, 'Agent 控制器') + arrow +
      step('thumb', '上线', 'assets/task-split/thumbs-up.png', '竖起大拇指');
    s.innerHTML = '<div class="task-split-canvas">' +
      '<h2 class="task-split-title">CASE高考：Task 拆分</h2>' +
      '<div class="task-era ancient">古法</div>' +
      '<div class="task-flow top">' + top + '</div>' +
      '<div class="task-flow bottom">' + bottom + '</div>' +
      '<div class="task-era now"><span>Now</span></div>' +
      '</div>';
    return s;
  }

  for (let i = 1; i <= IMAGES; i++) {
    if (i === 12) {
      continue;                 // slide-12 是 slide-11 的第二个播放状态
    }
    if (i === 21) {
      continue;                 // 删除原第 22 页
    }
    if (i === 28) {
      deck.appendChild(createPromptSlide());
      continue;
    }
    if (i === 29) {
      continue;
    }
    if (i === 42) {
      deck.appendChild(createHeroCardSlide());
      continue;
    }
    if (i === 47) {
      deck.appendChild(createTaskSplitSlide());
      continue;
    }
    const s = document.createElement('section');
    s.className = 'slide';
    const stitchClass = STITCH_SLIDES[i];
    const solidBackground = SOLID_BACKGROUNDS[i];
    if (stitchClass) {
      s.classList.add('stitch-slide', stitchClass);
    } else if (solidBackground) {
      s.classList.add('solid-bg');
      if (solidBackground === 'dual') {
        s.classList.add('dual-bg');
      } else if (solidBackground === 'dual-51') {
        s.classList.add('dual-bg-51');
      } else if (solidBackground === 'dual-horizontal') {
        s.classList.add('dual-bg-horizontal');
      } else {
        s.style.background = solidBackground;
      }
    } else if (GRADIENT_BACKGROUND_SLIDES.has(i)) {
      s.classList.add('gradient-bg');
    } else {
      const edgeFill = EDGE_FILL_SLIDES.has(i);
      if (edgeFill) {
        s.classList.add('edge-fill');
      } else {
        const ambient = document.createElement('img');
        ambient.className = 'ambient';
        ambient.src = 'assets/slides/blur-' + i + '.webp';
        ambient.alt = '';
        ambient.decoding = 'async';
        s.appendChild(ambient);
      }
    }
    const img = document.createElement('img');
    img.className = 'main';
    img.src = i === 1
      ? 'assets/generated/slide-1-stitched-v2.png'
      : i === 56
        ? 'assets/generated/slide-56-no-baseline.png'
        : 'assets/slides/slide-' + i + '.webp';
    img.alt = 'Slide ' + i;
    img.decoding = 'async';
    s.appendChild(img);
    if (i === 7) {
      s.classList.add('context-video-slide');
      const attentionTitle = document.createElement('div');
      attentionTitle.className = 'attention-title';
      attentionTitle.innerHTML = '预测<br>下一个词汇';
      const videoShell = document.createElement('div');
      videoShell.className = 'attention-video-shell';
      videoShell.innerHTML = '<video class="attention-video" src="assets/generated/attention-3m59-4m29.mp4" muted playsinline preload="metadata" aria-label="Attention mechanism animation, 3:59 to 4:29"></video>';
      s.appendChild(attentionTitle);
      s.appendChild(videoShell);
    }
    if (i === 1) {
      const copy = document.createElement('div');
      copy.className = 'stitch-upper-copy';
      copy.innerHTML = '<div class="corner l">Harness</div><div class="corner r">Engineering</div>' +
        '<div class="headline"><span>人类早期</span><span>驯服野马指南</span></div>';
      s.appendChild(copy);
    }
    if (i === 11) {
      s.classList.add('step-slide');
      const overlay = document.createElement('img');
      overlay.className = 'step-overlay';
      overlay.src = 'assets/slides/slide-12.webp';
      overlay.alt = '论文截图展开';
      overlay.decoding = 'async';
      s.appendChild(overlay);
    }
    if (i === 56) {
      s.classList.add('final-map-slide');
      const reveal = document.createElement('div');
      reveal.className = 'map-reveal';
      reveal.innerHTML = '<img class="exploration-map" src="assets/generated/exploration-map.png" alt="">';
      const glow = document.createElement('div');
      glow.className = 'map-glow';
      s.appendChild(reveal);
      s.appendChild(glow);
    }
    deck.appendChild(s);
  }

  let current = 0;
  const finalMapSlide = document.querySelector('.final-map-slide');
  const stepSlide = document.querySelector('.step-slide');
  const contextVideoSlide = document.querySelector('.context-video-slide');
  const attentionVideo = contextVideoSlide.querySelector('.attention-video');
  const heroCardSlide = document.querySelector('.hero-card-slide');
  const HERO_CARD_PAGE = 41;
  let heroCardStep = 0;
  let mapRevealTimer = null;

  function clamp(n) { return Math.max(0, Math.min(TOTAL - 1, n)); }

  function go(n, instant) {
    n = clamp(n);
    if (n === current && !instant) return;
    const previous = current;
    current = n;
    resetAttentionVideo();
    if (current !== TOTAL - 1) resetMapReveal();
    if (current !== HERO_CARD_PAGE || previous !== HERO_CARD_PAGE) setHeroCardStep(0);
    const promptState = current === 28 ? 'trend' : 'removed';
    document.querySelectorAll('[data-prompt-panel]').forEach(function (panel) {
      panel.classList.toggle('is-active', panel.dataset.promptPanel === promptState);
    });
    stepSlide.classList.toggle('step-revealed', current >= 12);
    const physicalPage = current - (current > 11 ? 1 : 0) - (current > 27 ? 1 : 0);
    const swappingStepState = (previous === 11 || previous === 12) && (current === 11 || current === 12);
    const swappingPromptState = (previous === 27 || previous === 28) && (current === 27 || current === 28);
    deck.style.transition = instant || swappingStepState || swappingPromptState ? 'none' : '';
    deck.style.transform = 'translateY(' + (-physicalPage * 100) + 'vh)';
    counter.textContent = (current + 1) + ' / ' + TOTAL;
    progressBar.style.width = ((current + 1) / TOTAL * 100) + '%';
    history.replaceState(null, '', '#' + (current + 1));
  }

  function resetMapReveal() {
    clearTimeout(mapRevealTimer);
    finalMapSlide.classList.remove('is-revealing', 'is-revealed');
  }

  function playMapReveal() {
    clearTimeout(mapRevealTimer);
    finalMapSlide.classList.remove('is-revealing', 'is-revealed');
    void finalMapSlide.offsetWidth;
    finalMapSlide.classList.add('is-revealing');
    mapRevealTimer = setTimeout(function () {
      finalMapSlide.classList.remove('is-revealing');
      finalMapSlide.classList.add('is-revealed');
    }, 5650);
  }

  function resetAttentionVideo() {
    contextVideoSlide.classList.remove('video-playing');
    attentionVideo.pause();
    attentionVideo.currentTime = 0;
  }

  function playAttentionVideo() {
    attentionVideo.currentTime = 0;
    attentionVideo.play().catch(function () {});
    contextVideoSlide.classList.add('video-playing');
  }

  function setHeroCardStep(step) {
    heroCardStep = Math.max(0, Math.min(3, step));
    heroCardSlide.classList.remove('card-step-0', 'card-step-1', 'card-step-2', 'card-step-3');
    heroCardSlide.classList.add('card-step-' + heroCardStep);
    heroCardSlide.querySelectorAll('[data-card-index]').forEach(function (card) {
      card.classList.toggle('is-visible', Number(card.dataset.cardIndex) <= heroCardStep);
    });
  }

  function advance() {
    if (current === 7 && !contextVideoSlide.classList.contains('video-playing')) playAttentionVideo();
    else if (current === HERO_CARD_PAGE && heroCardStep < 3) setHeroCardStep(heroCardStep + 1);
    else if (current === TOTAL - 1) playMapReveal();
    else go(current + 1);
  }

  function retreat() {
    if (current === 7 && contextVideoSlide.classList.contains('video-playing')) resetAttentionVideo();
    else if (current === HERO_CARD_PAGE && heroCardStep > 0) setHeroCardStep(heroCardStep - 1);
    else go(current - 1);
  }

  heroCardSlide.addEventListener('click', function (e) {
    if (current !== HERO_CARD_PAGE) return;
    e.preventDefault();
    advance();
  });

  // 填充/适应 切换（F 键），默认适应并记住后续选择
  const FIT_STORAGE_KEY = 'deck-fit-v2';
  const toast = document.getElementById('toast');
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 1400);
  }
  function setFit(mode, silent) {
    document.body.classList.toggle('fit-contain', mode === 'contain');
    localStorage.setItem(FIT_STORAGE_KEY, mode);
    if (!silent) showToast(mode === 'contain' ? '适应：完整显示，可能有边' : '填充：铺满屏幕，边缘可能裁切');
  }
  setFit(localStorage.getItem(FIT_STORAGE_KEY) || 'contain', true);

  // 键盘
  window.addEventListener('keydown', function (e) {
    if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      setFit(document.body.classList.contains('fit-contain') ? 'cover' : 'contain');
      return;
    }
    if (e.key === ' ' && current === 7 && contextVideoSlide.classList.contains('video-playing')) {
      e.preventDefault();
      if (attentionVideo.paused) {
        if (attentionVideo.ended) attentionVideo.currentTime = 0;
        attentionVideo.play().catch(function () {});
        showToast('继续播放');
      } else {
        attentionVideo.pause();
        showToast('已暂停');
      }
      return;
    }
    switch (e.key) {
      case 'ArrowDown': case 'PageDown': case ' ': case 'Enter':
        e.preventDefault(); advance(); break;
      case 'ArrowUp': case 'PageUp':
        e.preventDefault(); retreat(); break;
      case 'Home':
        e.preventDefault(); go(0); break;
      case 'End':
        e.preventDefault(); go(TOTAL - 1); break;
    }
  });

  // 滚轮（节流：一次滚动只翻一页）
  let wheelLock = false;
  window.addEventListener('wheel', function (e) {
    e.preventDefault();
    if (wheelLock || Math.abs(e.deltaY) < 12) return;
    wheelLock = true;
    if (e.deltaY > 0) advance();
    else retreat();
    setTimeout(function () { wheelLock = false; }, 620);
  }, { passive: false });

  // 触摸滑动
  let touchY = null;
  window.addEventListener('touchstart', function (e) {
    touchY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', function (e) {
    if (touchY === null) return;
    const dy = touchY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 40) {
      if (dy > 0) advance();
      else retreat();
    }
    touchY = null;
  }, { passive: true });

  // 支持 #页码 直达（含手动改地址栏 hash）
  window.addEventListener('hashchange', function () {
    const n = parseInt(location.hash.slice(1), 10);
    if (!isNaN(n)) go(n - 1);
  });
  const start = parseInt(location.hash.slice(1), 10);
  go(isNaN(start) ? 0 : start - 1, true);
})();
</script>
